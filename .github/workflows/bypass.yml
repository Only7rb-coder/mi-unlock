name: Run Bypasser

on:
  workflow_dispatch:
    inputs:
      row_1:
        description: "Row 1 (token.txt/timeshift.txt line number)"
        required: true
        default: "1"
      row_2:
        description: "Row 2 (token.txt/timeshift.txt line number)"
        required: true
        default: "2"
      row_3:
        description: "Row 3 (token.txt/timeshift.txt line number)"
        required: true
        default: "3"
      row_4:
        description: "Row 4 (token.txt/timeshift.txt line number)"
        required: true
        default: "4"

jobs:
  run-rows:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        row:
          - ${{ github.event.inputs.row_1 }}
          - ${{ github.event.inputs.row_2 }}
          - ${{ github.event.inputs.row_3 }}
          - ${{ github.event.inputs.row_4 }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests ntplib pytz urllib3 icmplib colorama

      - name: Validate row input
        run: |
          if ! [[ "${{ matrix.row }}" =~ ^[0-9]+$ ]]; then
            echo "Invalid row: ${{ matrix.row }} (must be numeric)"
            exit 1
          fi

      - name: Run NScript
        run: |
          python NScript.py --rows ${{ matrix.row }}
