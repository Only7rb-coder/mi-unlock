name: Run Bypasser

on:
  workflow_dispatch:
    inputs:
      row_1:
        description: "Row 1 (token.txt/timeshift.txt line number)"
        required: true
        default: "1"
      row_2:
        description: "Row 2 (token.txt/timeshift.txt line number)"
        required: true
        default: "2"
      row_3:
        description: "Row 3 (token.txt/timeshift.txt line number)"
        required: true
        default: "3"
      row_4:
        description: "Row 4 (token.txt/timeshift.txt line number)"
        required: true
        default: "4"

jobs:
  run-row-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install requests ntplib pytz urllib3 icmplib colorama
      - run: python NScript.py --rows ${{ github.event.inputs.row_1 }}

  run-row-2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install requests ntplib pytz urllib3 icmplib colorama
      - run: python NScript.py --rows ${{ github.event.inputs.row_2 }}

  run-row-3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install requests ntplib pytz urllib3 icmplib colorama
      - run: python NScript.py --rows ${{ github.event.inputs.row_3 }}

  run-row-4:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install requests ntplib pytz urllib3 icmplib colorama
      - run: python NScript.py --rows ${{ github.event.inputs.row_4 }}
