name: Run Bypasser

on:
  workflow_dispatch:
    inputs:
      group_a_rows:
        description: "Token rows for Group A (space-separated, e.g. '1 3')"
        required: true
        default: "1 3"
      group_b_rows:
        description: "Token rows for Group B (space-separated, e.g. '2 4')"
        required: true
        default: "2 4"

jobs:
  run-group-a:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests ntplib pytz urllib3 icmplib colorama

      - name: Run NScript for Group A
        run: |
          python NScript.py --rows ${{ github.event.inputs.group_a_rows }}

  run-group-b:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests ntplib pytz urllib3 icmplib colorama

      - name: Run NScript for Group B
        run: |
          python NScript.py --rows ${{ github.event.inputs.group_b_rows }}
